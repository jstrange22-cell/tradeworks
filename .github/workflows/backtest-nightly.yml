name: Backtest Regression

on:
  schedule:
    - cron: '0 4 * * *' # 4 AM UTC daily
  workflow_dispatch: # Allow manual trigger

jobs:
  backtest:
    name: Nightly Backtest Regression
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tradeworks_test
          POSTGRES_USER: tradeworks
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tradeworks -d tradeworks_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      clickhouse:
        image: clickhouse/clickhouse-server:24
        ports:
          - 8123:8123
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo build --filter=@tradeworks/db --filter=@tradeworks/indicators --filter=@tradeworks/strategies --filter=@tradeworks/backtester --filter=@tradeworks/shared

      - name: Run database migrations
        env:
          DATABASE_URL: postgres://tradeworks:test_password@localhost:5432/tradeworks_test
        run: |
          cd packages/db
          npx drizzle-kit push

      - name: Seed test market data
        env:
          CLICKHOUSE_URL: http://localhost:8123
          DATABASE_URL: postgres://tradeworks:test_password@localhost:5432/tradeworks_test
        run: pnpm tsx scripts/seed-backtest-data.ts

      - name: Run backtest regression suite
        env:
          CLICKHOUSE_URL: http://localhost:8123
          DATABASE_URL: postgres://tradeworks:test_password@localhost:5432/tradeworks_test
        run: pnpm tsx scripts/run-backtest-regression.ts

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results-${{ github.run_number }}
          path: backtest-results/
          retention-days: 30
