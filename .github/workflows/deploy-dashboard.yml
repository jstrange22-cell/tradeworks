# ──────────────────────────────────────────────────────────────
# Deploy Dashboard to GitHub Pages
# Triggers on push to master or manual dispatch.
# Builds the Vite dashboard SPA and publishes to gh-pages branch.
# ──────────────────────────────────────────────────────────────

name: Deploy Dashboard

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-dashboard
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dashboard
        run: pnpm turbo build --filter=dashboard
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'http://localhost:4000' }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/dashboard/dist
