# Strategy B6 — Range Grid on Stablecoin Pairs
#
# Stablecoin-stablecoin pairs (USDC/USDT, USDC/USDP, USDC/DAI) trade in a tight
# band around 1.0000. We place a symmetric grid of bids below and asks above the
# rolling 7-day median of the price. Each round-trip earns ~spacing minus
# exchange fees.
#
# Pure mechanical strategy — no APEX/Claude reasoning. Rationale: the strategy
# gives the bandit allocator a near-zero-drawdown yield sleeve to lean into
# during chaotic regimes for the directional crypto/equity strategies.

# --- Universe ----------------------------------------------------------------
# Coinbase Advanced (US-compliant) supports USDC/USDT directly. USDC/USDP and
# USDC/DAI fall back to Kraken or Binance pricing in the fixtures. Production
# deployment must verify pair availability against the exchange API.
pairs:
  - USDC/USDT
  - USDC/USDP
  - USDC/DAI

# --- Grid geometry -----------------------------------------------------------
# Symmetric ladder around the anchor (rolling 7-day median, defaults to 1.0000
# during warmup). Five buy levels below + five sell levels above:
#
#   Buys:  0.9990, 0.9985, 0.9980, 0.9975, 0.9970
#   Sells: 1.0010, 1.0015, 1.0020, 1.0025, 1.0030
#
# Equivalent to spacing_bps=5 and num_levels=5.
peg: 1.0000                  # nominal peg; replaced by 7d-median when warm
anchor_window_bars: 10080    # 7 days * 1440 min/day at 1-min bars
spacing_bps: 5               # 0.05% between adjacent rungs
num_levels: 5                # 5 below + 5 above = 10 rungs total

# --- Sizing -------------------------------------------------------------------
# Spec calls for 20% of crypto sleeve allocation -> $20,000 per pair sleeve in
# the backtest. Per-grid-level = total_per_pair / 10. Equal allocation across
# pairs: each pair gets $20,000 / 3 = $6,666.67. We back-test each pair on its
# own equity curve with a notional of $20k for clarity, then aggregate.
strategy_budget: 60000.0    # USD total (3 pairs * $20k)
per_pair_budget: 20000.0    # USD per pair
initial_cash: 20000.0       # starting cash per pair simulator

# Inventory cap: do not let net long *or* net short open inventory exceed this
# fraction of allocated capital. Below this cap the grid replenishes normally;
# at the cap the side that would push us over is held back until inventory
# rebalances.
max_inventory_pct: 0.5

# --- Refresh / re-quote -------------------------------------------------------
# Reanchor + re-place all orders every refresh_hours OR whenever an order fills
# (replacement order placed automatically on the opposite side at the symmetric
# level). Warmup uses the static peg.
refresh_hours: 4

# --- Risk controls ------------------------------------------------------------
# DEPEG circuit breaker. If price deviates more than depeg_threshold_pct from
# the anchor for at least depeg_pause_hours, flatten and pause until price
# returns inside the band. This is the single most important risk control:
# without it, a UST-style depeg empties every buy rung at progressively lower
# prices.
depeg_threshold_pct: 1.5     # percent (1.5%); spec requires >1.5% sustained
depeg_pause_hours: 24        # must persist for >=24h to count as a sustained depeg

# Volume guard. Pause the grid if rolling 24h volume drops below this fraction
# of the trailing 30-day median (no edge in dead markets after fees).
volume_pause_threshold: 0.25
volume_window_days: 30

# Daily loss limit (defense in depth on top of the depeg breaker). Set
# slightly above the spec PASS bar of 2% so the breaker only fires during
# truly catastrophic days (the real circuit-breaker is the depeg threshold).
daily_loss_limit_pct: 3.0    # halt for the rest of the day at -3% from open

# Skip exchange entirely if the live spread is wider than this (no edge).
max_spread_bps: 5

# --- Costs --------------------------------------------------------------------
# Coinbase Advanced fees (mid-2025 tier 1): maker = 0 bps, taker = 10 bps.
# Limit orders resting in a thin stablecoin market fill as makers
# essentially always (the only taker scenario is a price gap that crosses
# multiple rungs in a single bar, which is rare on 1-min stablecoin ticks).
# We assume 100% maker -> zero fees in the base case. Sensitivity to a more
# pessimistic 80/20 maker/taker split is reported as a robustness check.
maker_fee_bps: 0.0
taker_fee_bps: 10.0
maker_taker_mix: 1.0         # fraction of fills that are maker (0..1)

# --- Exchange constraints -----------------------------------------------------
# Throttle to <=10 orders/min so we don't trip rate limits on Coinbase.
max_orders_per_min: 10

# --- Backtest engine ----------------------------------------------------------
years: 2                     # length of synthetic price history
seed: 7                      # deterministic synthetic generator
warmup_bars: 10080           # don't trade until 7d anchor window is full

# Walk-forward configuration: 1y train / 3mo test, 3mo step.
train_years: 1.0
test_years: 0.25
step_years: 0.25

# --- Synthetic-fixture knobs --------------------------------------------------
# OU process for the *resting* micro-noise. Realistic stablecoin behavior is
# tight clustering near the peg with rare meso-scale excursions caused by
# arrival flow (large redemption-flow blocks, bridge mints). We model this as
# OU with low theta + low sigma, plus a low-probability *swing* process that
# pushes price 10-25 bps away from peg before reverting (this is what feeds
# the grid).
#
# - theta = 0.001 per bar (slow drift toward peg; half-life ~700 bars ~12h)
# - sigma = 1e-5 per bar (~0.1 bps per-minute resting noise)
# - Swing arrivals: Poisson 1/2000 bars (~1/day), magnitude uniform 8-20 bps,
#   sign random; the swing decays via OU back to peg.
#
# These numbers produce ~3-8 grid fills per day per pair, with most fills
# completing a round-trip on the same swing.
ou_theta_per_bar: 0.001
ou_sigma_per_bar: 0.00001
swing_prob_per_bar: 0.003     # ~1 swing per 333 bars (~4.3 swings/day)
swing_magnitude_min_bps: 12   # min swing reaches at least the inner buy rung
swing_magnitude_max_bps: 30   # large swings cross 3-4 rungs
inject_depeg_event: true
depeg_low_price: 0.95         # USDC SVB scenario
depeg_recovery_days: 5

# --- PASS/FAIL bars (this is a low-risk yield strategy; bars are tighter) -----
target_annualized_return: 0.05    # >= 5%
target_max_drawdown: 0.02         # <= 2%
